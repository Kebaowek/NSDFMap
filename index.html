<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Species Observations (Mapbox tileset/KML version)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.25.0/mapbox-gl.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }
    .menu {
      position:absolute; z-index:2; background: rgba(255,255,255,0.95);
      margin:12px; padding:10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.2);
    }
    .menu label { display:block; margin-bottom:8px; cursor:pointer; }
     .menu input { margin-right: 6px; }
    .layer-icon {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      display: inline-block;
    }
    .menu-section {
      margin-top: 12px;
      margin-bottom: 6px;
      display: block;
      border-top: 1px solid #ddd;
      padding-top: 8px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="menu" id="layerMenu">
  <strong>Toggle Species</strong>
  <!-- Replace data-layer values with the exact layer IDs you set in Mapbox Studio -->
  <label><input type="checkbox" data-layer="Deer Observations" checked> Deer Observations</label>
  <label><input type="checkbox" data-layer="Bear Observations" checked> Bear Observations</label>
  <label><input type="checkbox" data-layer="Moose Observations" checked> Moose Observations</label>
  <label><input type="checkbox" data-layer="Wolf Observations" checked> Wolf Observations</label>
  <label><input type="checkbox" data-layer="Wolf Observations 2025-2026" checked> Wolf Observations 2025-2026</label>
  <label>Wolf Collar Tracking Data</label>
  <label>
  <input type="checkbox" data-layer="36140 Collar" checked> 
  <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/36140.png" class="layer-icon" alt=""> 36140 Collar
  </label>
  <label><input type="checkbox" data-layer="36144A Collar" checked> 
  <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/36144A.png" class="layer-icon" alt=""> 36144A Collar
  </label>
  <label><input type="checkbox" data-layer="36144B Collar" checked> 
  <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/36144B.png" class="layer-icon" alt=""> 36144B Collar
  </label>
  <label><input type="checkbox" data-layer="687712A Collar" checked>
     <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/687712A.png" class="layer-icon" alt=""> 687712A Collar</label>
  <label><input type="checkbox" data-layer="687714A Collar" checked>
     <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/687714A.png" class="layer-icon" alt="">687714A Collar</label>
  <label><input type="checkbox" data-layer="704623A Collar" checked>
     <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/704623A.png" class="layer-icon" alt="">704623A Collar</label>
  <label><input type="checkbox" data-layer="704624A Collar" checked>
     <img src="https://raw.githubusercontent.com/Kebaowek/Symbols/main/704624A.png" class="layer-icon" alt="">704624A Collar</label>

</div>
<script>
  // ---------- CONFIGURE THESE ----------
  const MAPBOX_TOKEN = 'pk.eyJ1Ijoia2ViYW93ZWsiLCJhIjoiY21teXVkcGJtMDFrdzJwcHpwNm93djhzYyJ9.ebxif9cg-1zkxz_LQcBOSA';
  const STYLE_URL = 'mapbox://styles/kebaowek/cmr503704002a01qo6cbuffth'; // from Mapbox Studio
  // The layer IDs below must match the layer IDs you used in Mapbox Studio exactly.
  const layerIds = ['Deer Observations','Bear Observations','Moose Observations','Wolf Observations', 'Wolf Observations 2025-2026', '36140 Collar', '36144A Collar', '36144B Collar', '687712A Collar', '687714A Collar', '704623A Collar', '704624A Collar'];
  // -------------------------------------

  mapboxgl.accessToken = MAPBOX_TOKEN;

  console.log("WebGL supported:", mapboxgl.supported());
  
  const map = new mapboxgl.Map({
    container: 'map',
    style: STYLE_URL,
    center: [-77.373, 46.044], // change to your study area center
    zoom: 10
  });

  console.log(map)

  map.on('load', () => {
    console.log(map.getLayer('Deer Observations'));
    // map is using your Mapbox Studio style which already contains the four tileset-based layers.
    // Confirm that the layers exist:
    layerIds.forEach(id => {
      if (!map.getLayer(id)) {
        console.warn('Layer not found in style (check id):', id);
      }
    });
  });

  // Toggle checkbox visibility -> layout.visibility
  document.getElementById('layerMenu').addEventListener('change', (e) => {
    const cb = e.target;
    if (!cb || !cb.dataset || !cb.dataset.layer) return;
    const id = cb.dataset.layer;
    const vis = cb.checked ? 'visible' : 'none';
    if (map.getLayer(id)) {
      map.setLayoutProperty(id, 'visibility', vis);
    } else {
      console.warn('Attempted to toggle missing layer:', id);
    }
  });

  // // Optional: popup on click (works if layers are point layers)
  layerIds.forEach(id => {
    map.on('click', id, (e) => {
      if (!e.features || !e.features.length) return;

      const feature = e.features[0];
      const imgUrl = feature.properties?.img_url;

      // If no image URL, do nothing
      if (!imgUrl) return;

      const name = feature.properties?.Name || '';
      const date = feature.properties?.Date || '';

      const popupHtml = `
        <div style="max-width:260px; font-family: Arial, sans-serif;">

          <img 
            src="${imgUrl}"
            style="
              width:100%;
              max-height:260px;
              object-fit:cover;
              border-radius:6px;
              display:block;
              margin-bottom:6px;
            "
          />

          <div style="font-size:14px; font-weight:bold;">
            ${name}
          </div>

          <div style="font-size:12px; color:#555;">
            ${date}
          </div>

        </div>
      `;

    new mapboxgl.Popup({ closeButton: true })
        .setLngLat(e.lngLat)
        .setHTML(popupHtml)
        .addTo(map);
    });

    map.on('mouseenter', id, () => {
      map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', id, () => {
      map.getCanvas().style.cursor = '';
    });
  });
  
</script>
</body>

</html>
